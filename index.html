<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uber Tracker</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #06d6a0;
            --blue-color: #3a86ff;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            padding-bottom: 40px;
        }

        h2 { text-align: center; color: var(--accent-color); margin-bottom: 20px; }
        
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            color: #121212;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
        }

        .btn-start { background-color: var(--blue-color); color: white; }
        .btn-start:active { background-color: #2a6fdf; }
        
        .btn-end { background-color: var(--accent-color); }
        .btn-end:active { background-color: #04b888; }

        .status-box {
            background-color: rgba(58, 134, 255, 0.15);
            border: 1px solid var(--blue-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 15px;
        }

        .result-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat {
            background: #252525;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-val { font-size: 18px; font-weight: bold; color: var(--accent-color); margin-top: 4px;}

        .history-item {
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .history-date { color: var(--text-muted); font-size: 12px; }
    </style>
</head>
<body>

    <h2>TRACKER 🚗</h2>

    <div id="statusContainer" style="display: none;"></div>

    <div class="card" id="cardInicio">
        <div class="form-group">
            <label>🟢 KM Inicial </label>
            <input type="number" id="kmInicial" placeholder="Ej. 45000" inputmode="numeric">
        </div>
        <button class="btn-start" onclick="iniciarTurno()">Iniciar Turno 🚗💨</button>
    </div>

    <div class="card" id="cardFin" style="display: none;">
        <div class="form-group">
            <label>🏁 KM Final (Al terminar el día)</label>
            <input type="number" id="kmFinal" placeholder="Ej. 45180" inputmode="numeric">
        </div>
        <div class="form-group">
            <label>💰 Ganancia Total del Turno ($)</label>
            <input type="number" id="ganancia" placeholder="Ej. 350" inputmode="numeric">
        </div>
        <button class="btn-end" onclick="finalizarTurno()">🏁 Finalizar y Registrar Turno</button>
        <button onclick="cancelarTurnoActual()" style="background: transparent; color: #ff4d4d; font-size: 13px; margin-top: 10px; padding: 5px;">❌ Cancelar Turno Actual</button>
    </div>

    <div class="card" id="resultadosCard" style="display:none;">
        <label>📊 Resumen del Último Turno:</label>
        <div class="result-box">
            <div class="stat">Distancia<div class="stat-val" id="resKm">0 km</div></div>
            <div class="stat">Rendimiento<div class="stat-val" id="resRent">$0.00/km</div></div>
        </div>
    </div>

    <div class="card">
        <label>📅 Historial de Rutas</label>
        <div id="historial" style="margin-top: 10px;"></div>
        <button onclick="limpiarHistorial()" style="background: #ff4d4d; color: white; margin-top: 15px; padding: 8px; font-size: 12px; font-weight: normal;">Borrar Historial Completo</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            verificarTurnoActivo();
            mostrarHistorial();
        });

        function verificarTurnoActivo() {
            const kmInGuardado = localStorage.getItem('uberKmInicialActivo');
            const statusContainer = document.getElementById('statusContainer');
            const cardInicio = document.getElementById('cardInicio');
            const cardFin = document.getElementById('cardFin');

            if (kmInGuardado) {
                statusContainer.innerHTML = `<div class="status-box">Activo ⏳ <b>Turno en progreso</b><br>KM Inicial guardado: <b>${kmInGuardado} km</b></div>`;
                statusContainer.style.display = "block";
                cardInicio.style.display = "none";
                cardFin.style.display = "block";
            } else {
                statusContainer.style.display = "none";
                cardInicio.style.display = "block";
                cardFin.style.display = "none";
            }
        }

        function iniciarTurno() {
            const kmIn = parseFloat(document.getElementById('kmInicial').value);
            if (isNaN(kmIn) || kmIn <= 0) {
                alert("Por favor, ingresa un kilometraje inicial válido.");
                return;
            }
            localStorage.setItem('uberKmInicialActivo', kmIn);
            document.getElementById('kmInicial').value = '';
            verificarTurnoActivo();
        }

        function finalizarTurno() {
            const kmIn = parseFloat(localStorage.getItem('uberKmInicialActivo'));
            const kmFin = parseFloat(document.getElementById('kmFinal').value);
            const ganancia = parseFloat(document.getElementById('ganancia').value);

            if (isNaN(kmFin) || isNaN(ganancia) || kmFin <= kmIn) {
                alert("El KM Final debe ser un número mayor al KM Inicial (" + kmIn + " km).");
                return;
            }

            const kmTotales = kmFin - kmIn;
            const rendimiento = ganancia / kmTotales;

            // Mostrar en panel de resultados
            document.getElementById('resKm').innerText = kmTotales + " km";
            document.getElementById('resRent').innerText = "$" + rendimiento.toFixed(2) + "/km";
            document.getElementById('resultadosCard').style.display = "block";

            // Guardar en el Historial definitivo
            const registro = {
                fecha: new Date().toLocaleDateString(),
                kmInicial: kmIn,
                kmFinal: kmFin,
                kmTotales: kmTotales,
                rendimiento: rendimiento.toFixed(2),
                ganancia: ganancia
            };

            let historial = JSON.parse(localStorage.getItem('uberLogs')) || [];
            historial.unshift(registro);
            localStorage.setItem('uberLogs', JSON.stringify(historial));

            // Limpiar estado activo
            localStorage.removeItem('uberKmInicialActivo');
            document.getElementById('kmFinal').value = '';
            document.getElementById('ganancia').value = '';

            verificarTurnoActivo();
            mostrarHistorial();
        }

        function cancelarTurnoActual() {
            if (confirm("¿Quieres borrar el KM inicial de hoy y empezar de nuevo?")) {
                localStorage.removeItem('uberKmInicialActivo');
                verificarTurnoActivo();
            }
        }

        function mostrarHistorial() {
            const historial = JSON.parse(localStorage.getItem('uberLogs')) || [];
            const container = document.getElementById('historial');
            container.innerHTML = '';

            if (historial.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); font-size:14px;">No hay registros guardados.</p>';
                return;
            }

            historial.forEach(item => {
                const el = document.createElement('div');
                el.className = 'history-item';
                el.innerHTML = `
                    <div class="history-date">${item.fecha}</div>
                    <div><b>${item.kmTotales} km</b> rodados (${item.kmInicial} ➔ ${item.kmFinal})</div>
                    <div>Ganancia: <b>$${item.ganancia}</b></div>
                    <div style="color: var(--accent-color)">Rendimiento: $${item.rendimiento}/km</div>
                `;
                container.appendChild(el);
            });
        }

        function limpiarHistorial() {
            if (confirm("¿Seguro que quieres borrar todo tu historial acumulado?")) {
                localStorage.removeItem('uberLogs');
                mostrarHistorial();
                document.getElementById('resultadosCard').style.display = "none";
            }
        }
    </script>
</body>
</html>
